<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>miniONNXRuntime Logo</title>
  <style>
    :root {
      --bg: #0b1020;
      --ink: #eef3ff;
      --muted: rgba(238, 243, 255, 0.7);
      --line: rgba(255, 255, 255, 0.08);
      --a: #6db3ff;
      --b: #f6c177;
      --c: #74d3ae;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 28% 28%, rgba(109, 179, 255, 0.20), transparent 18%),
        radial-gradient(circle at 72% 26%, rgba(246, 193, 119, 0.16), transparent 16%),
        radial-gradient(circle at 50% 72%, rgba(116, 211, 174, 0.16), transparent 20%),
        linear-gradient(180deg, #0b1020 0%, #09101b 100%);
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .canvas {
      width: 1600px;
      height: 900px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0.32;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), transparent 92%);
    }

    .halo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 760px;
      height: 760px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.03) 0 20%, transparent 21%),
        radial-gradient(circle, rgba(109,179,255,0.12) 0 33%, transparent 34%),
        radial-gradient(circle, rgba(246,193,119,0.08) 0 48%, transparent 49%),
        radial-gradient(circle, rgba(116,211,174,0.06) 0 62%, transparent 63%);
      filter: blur(1px);
      opacity: 0.8;
    }

    .logo-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 620px;
      height: 620px;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
    }

    .logo {
      position: relative;
      width: 420px;
      height: 420px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 18px 44px rgba(0,0,0,0.38));
    }

    .core {
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #10182b, #0d1322);
      border: 1px solid rgba(255,255,255,0.10);
      transform: rotate(45deg);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 0 24px rgba(255,255,255,0.03);
    }

    .core::before,
    .core::after {
      content: "";
      position: absolute;
      inset: 30px;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.02),
        inset 0 0 24px rgba(255,255,255,0.02);
    }

    .ring.one {
      width: 300px;
      height: 300px;
      border-color: rgba(109, 179, 255, 0.22);
      clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
      transform: rotate(12deg);
    }

    .ring.two {
      width: 300px;
      height: 300px;
      border-color: rgba(246, 193, 119, 0.22);
      clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
      transform: rotate(-10deg);
    }

    .ring.three {
      width: 300px;
      height: 300px;
      border-color: rgba(116, 211, 174, 0.22);
      clip-path: polygon(0 0, 38% 0, 38% 100%, 0 100%);
      transform: rotate(-12deg);
    }

    .ring.four {
      width: 300px;
      height: 300px;
      border-color: rgba(255,255,255,0.12);
      clip-path: polygon(62% 0, 100% 0, 100% 100%, 62% 100%);
      transform: rotate(8deg);
    }

    .orb {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      box-shadow:
        0 0 20px currentColor,
        0 0 44px rgba(255,255,255,0.16);
    }

    .orb.a { color: var(--a); background: var(--a); top: 42px; left: 92px; }
    .orb.b { color: var(--b); background: var(--b); top: 42px; right: 92px; }
    .orb.c { color: var(--c); background: var(--c); bottom: 42px; left: 92px; }
    .orb.d { color: #cfd9ea; background: #cfd9ea; bottom: 42px; right: 92px; }

    .link {
      position: absolute;
      width: 220px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform-origin: left center;
    }

    .link.one { left: 90px; top: 54px; transform: rotate(24deg); }
    .link.two { right: 90px; top: 54px; transform: rotate(-24deg); }
    .link.three { left: 90px; bottom: 54px; transform: rotate(-24deg); }
    .link.four { right: 90px; bottom: 54px; transform: rotate(24deg); }

    .accent {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.0) 0 32%, rgba(255,255,255,0.03) 33% 34%, transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.0) 0 48%, rgba(255,255,255,0.03) 49% 50%, transparent 51%);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>
    <div class="halo"></div>
    <div class="logo-wrap">
      <div class="logo" aria-label="miniONNXRuntime logo mark">
        <div class="accent"></div>
        <div class="ring one"></div>
        <div class="ring two"></div>
        <div class="ring three"></div>
        <div class="ring four"></div>
        <div class="link one"></div>
        <div class="link two"></div>
        <div class="link three"></div>
        <div class="link four"></div>
        <div class="core"></div>
        <div class="orb a"></div>
        <div class="orb b"></div>
        <div class="orb c"></div>
        <div class="orb d"></div>
      </div>
    </div>
  </div>
</body>
</html>
