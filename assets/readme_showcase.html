<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>miniONNXRuntime showcase</title>
  <style>
    :root {
      --bg0: #ffffff;
      --bg1: #f6f8fb;
      --text: #101828;
      --muted: rgba(16, 24, 40, 0.62);
      --accent: #4b5563;
      --accent2: #6b7280;
      --accent3: #9ca3af;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
      width: 1280px;
      height: 620px;
      margin: 0 auto;
      position: relative;
      padding: 38px 44px;
    }

    .grid {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(107, 114, 128, 0.06), transparent 18%),
        radial-gradient(circle at 82% 26%, rgba(107, 114, 128, 0.04), transparent 16%);
      opacity: 1;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(107, 114, 128, 0.18);
      background: rgba(107, 114, 128, 0.05);
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .layout {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
      align-items: start;
    }

    .left {
      position: relative;
      z-index: 1;
      padding-top: 4px;
    }

    .logo-row {
      margin-top: 26px;
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .logo {
      width: 220px;
      height: 220px;
      border-radius: 44px;
      background:
        radial-gradient(circle at 30% 26%, rgba(107,114,128,0.08), transparent 24%),
        linear-gradient(145deg, rgba(255, 255, 255, 1), rgba(243, 244, 246, 1));
      border: 1px solid rgba(17, 24, 39, 0.14);
      box-shadow: none;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .logo svg {
      width: 150px;
      height: 150px;
    }

    .logo-copy {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .onnx-mark {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-copy strong {
      font-size: 104px;
      line-height: 0.88;
      letter-spacing: -0.07em;
      font-weight: 300;
      color: rgba(17, 24, 39, 0.96);
    }

    .logo-copy em {
      font-style: normal;
      font-size: 20px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .right {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      padding-top: 84px;
    }

    .pipeline {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .chain {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 54px 1fr 54px 1fr;
      align-items: center;
    }

    .node {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
    }

    .bubble {
      width: 146px;
      height: 146px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 30%, rgba(107,114,128,0.05), transparent 24%),
        rgba(255,255,255,0.9);
      border: 1px solid rgba(17, 24, 39, 0.12);
      box-shadow: none;
    }

    .bubble svg {
      width: 60px;
      height: 60px;
    }

    .node h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .arrow {
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 34px;
      font-weight: 900;
    }

    .flowline {
      width: 76%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(107, 114, 128, 0.22), transparent);
      position: relative;
      margin-top: 4px;
    }

    .flowline::before,
    .flowline::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      transform: translateY(-50%);
      box-shadow: none;
    }

    .flowline::before { left: 18%; background: var(--accent); }
    .flowline::after { left: 67%; background: var(--accent2); box-shadow: none; }

  </style>
</head>
<body>
  <div class="frame">
    <div class="grid"></div>
    <div class="layout">
      <section class="left">
        <div class="badge">Educational ONNX Runtime</div>

        <div class="logo-row">
          <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 19L48 8L76 19L87 48L76 77L48 88L20 77L9 48L20 19Z" stroke="#D7E9FF" stroke-opacity="0.55" stroke-width="2.8" stroke-linejoin="round"/>
              <path d="M20 19L48 48L76 19M20 77L48 48L76 77M9 48H87" stroke="#4B5563" stroke-opacity="0.9" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="20" cy="19" r="5" fill="#111827"/>
              <circle cx="48" cy="8" r="5" fill="#6B7280"/>
              <circle cx="76" cy="19" r="5" fill="#9CA3AF"/>
              <circle cx="87" cy="48" r="5" fill="#6B7280"/>
              <circle cx="76" cy="77" r="5" fill="#9CA3AF"/>
              <circle cx="48" cy="88" r="5" fill="#6B7280"/>
              <circle cx="20" cy="77" r="5" fill="#111827"/>
              <circle cx="9" cy="48" r="5" fill="#111827"/>
            </svg>
          </div>
          <div class="logo-copy">
            <div class="onnx-mark">
              <strong>ONNX</strong>
              <em>mini runtime</em>
            </div>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="pipeline">
          <div class="chain">
            <div class="node">
              <div class="bubble">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="8" y="9" width="32" height="30" rx="8" stroke="#6B7280" stroke-width="2.5"/>
                  <path d="M15 18H33M15 24H28M15 30H24" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
              </div>
              <h3>Parse</h3>
            </div>

            <div class="arrow">→</div>

            <div class="node">
              <div class="bubble">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M18 8H30L38 16V32L30 40H18L10 32V16L18 8Z" stroke="#6B7280" stroke-width="2.5"/>
                  <path d="M16 24H32" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
                  <path d="M24 16V32" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
              </div>
              <h3>Optimize</h3>
            </div>

            <div class="arrow">→</div>

            <div class="node">
              <div class="bubble">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="10" y="10" width="28" height="28" rx="6" stroke="#6B7280" stroke-width="2.5"/>
                  <path d="M16 16H32M16 22H32M16 28H32M16 34H32" stroke="#111827" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
              </div>
              <h3>Run</h3>
            </div>
          </div>

          <div class="flowline"></div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
